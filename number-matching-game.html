<!doctype html>
<html lang="th" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เกมจับคู่ตัวเลข</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    @keyframes bounce-in { 0% { transform: scale(0.8); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
    @keyframes star-spin { 0% { transform: rotate(0deg) scale(0); opacity:0; } 50% { transform: rotate(180deg) scale(1.3); opacity:1; } 100% { transform: rotate(360deg) scale(1); opacity:1; } }
    .card-bounce { animation: bounce-in 0.3s ease; }
    .card-shake { animation: shake 0.4s ease; }
    .card-pop { animation: pop 0.3s ease; }
    .star-anim { animation: star-spin 0.6s ease forwards; }
    .card-btn { transition: all 0.2s; cursor: pointer; user-select: none; }
    .card-btn:active { transform: scale(0.93); }
    .card-btn.selected { ring: 4px; box-shadow: 0 0 0 4px #f97316; }
    .card-btn.correct { background: #86efac !important; }
    .card-btn.wrong { background: #fca5a5 !important; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body class="h-full overflow-auto" style="background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 50%, #fed7aa 100%);">
  <div class="w-full min-h-full flex flex-col items-center px-4 py-6"><!-- Header -->
   <div class="flex items-center gap-3 mb-2"><img src="https://img1.pic.in.th/images/sayremove1.png" alt="Logo" class="w-10 h-10 rounded-full" loading="lazy" onerror="this.style.background='#fed7aa';this.alt='Logo';">
    <h1 id="game-title" class="text-3xl md:text-4xl font-extrabold text-orange-600 drop-shadow">🎯 จับคู่ตัวเลข</h1>
   </div><!-- Score -->
   <div class="flex gap-6 mb-4 text-lg font-bold text-orange-700"><span>⭐ คะแนน: <span id="score">0</span></span> <span>🎲 พยายาม: <span id="attempts">0</span></span>
   </div><!-- Game Board -->
   <div class="flex flex-col md:flex-row gap-4 md:gap-8 w-full max-w-4xl justify-center items-start"><!-- Left: Numbers -->
    <div class="flex-1">
     <h2 class="text-center text-xl font-bold text-orange-500 mb-2">ตัวเลข</h2>
     <div id="number-cards" class="grid grid-cols-2 gap-3"></div>
    </div><!-- Right: Items -->
    <div class="flex-1">
     <h2 class="text-center text-xl font-bold text-orange-500 mb-2">นับจำนวน</h2>
     <div id="item-cards" class="grid grid-cols-2 gap-3"></div>
    </div>
   </div><!-- Popup -->
   <div id="popup" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40">
    <div class="bg-white rounded-3xl p-8 text-center shadow-2xl max-w-sm mx-4">
     <div id="stars" class="text-5xl mb-4"></div>
     <h2 class="text-3xl font-extrabold text-orange-600 mb-2">🎉 ยอดเยี่ยม!</h2>
     <p id="popup-msg" class="text-lg text-gray-700 mb-4"></p><button onclick="startGame()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold text-xl px-8 py-3 rounded-full shadow-lg active:scale-95 transition">🔄 เล่นใหม่</button>
    </div>
   </div><!-- Footer -->
   <footer class="mt-auto pt-6 text-center text-sm text-orange-400 font-semibold">
    Designed &amp; Developed by Mansay.h © 2026
   </footer>
  </div>
  <script>
    const thaiNums = ['๐','๑','๒','๓','๔','๕','๖','๗','๘','๙','๑๐'];
    const emojis = ['⭐','🌸','⚽','🍎','🦋','🐟','🌈','🎈','💎','🍭'];
    let score = 0, attempts = 0, selectedNumber = null, matchedPairs = 0;

    const defaultConfig = { game_title: '🎯 จับคู่ตัวเลข' };

    function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }

    function playSound(success) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if(success) { osc.frequency.value=523; gain.gain.value=0.3; osc.start(); osc.frequency.setValueAtTime(659,ctx.currentTime+0.1); osc.frequency.setValueAtTime(784,ctx.currentTime+0.2); osc.stop(ctx.currentTime+0.3); }
        else { osc.frequency.value=200; gain.gain.value=0.2; osc.start(); osc.stop(ctx.currentTime+0.2); }
      } catch(e){}
    }

    function startGame() {
      score=0; attempts=0; matchedPairs=0; selectedNumber=null;
      document.getElementById('score').textContent='0';
      document.getElementById('attempts').textContent='0';
      document.getElementById('popup').classList.add('hidden');

      const nums = shuffle([...Array(10)].map((_,i)=>i+1));
      const items = shuffle([...Array(10)].map((_,i)=>i+1));

      const nc = document.getElementById('number-cards');
      nc.innerHTML = nums.map(n => `<div class="card-btn card-bounce bg-white rounded-2xl shadow-md p-4 flex items-center justify-center text-center border-2 border-orange-200 min-h-[70px]" data-num="${n}" onclick="selectNumber(this)"><span class="text-2xl md:text-3xl font-extrabold text-orange-700">${n} <span class="text-orange-400">(${thaiNums[n]})</span></span></div>`).join('');

      const ic = document.getElementById('item-cards');
      ic.innerHTML = items.map(n => {
        const emoji = emojis[n-1];
        const display = Array(n).fill(emoji).join(' ');
        return `<div class="card-btn card-bounce bg-white rounded-2xl shadow-md p-3 flex items-center justify-center text-center border-2 border-orange-200 min-h-[70px] flex-wrap" data-num="${n}" onclick="selectItem(this)"><span class="text-xl md:text-2xl leading-relaxed">${display}</span></div>`;
      }).join('');
    }

    function selectNumber(el) {
      if(el.classList.contains('correct')) return;
      document.querySelectorAll('#number-cards .card-btn').forEach(c=>c.classList.remove('selected'));
      el.classList.add('selected');
      el.classList.add('card-pop');
      setTimeout(()=>el.classList.remove('card-pop'),300);
      selectedNumber = el;
    }

    function selectItem(el) {
      if(!selectedNumber || el.classList.contains('correct')) return;
      attempts++;
      document.getElementById('attempts').textContent = attempts;

      if(parseInt(selectedNumber.dataset.num) === parseInt(el.dataset.num)) {
        score++;
        matchedPairs++;
        document.getElementById('score').textContent = score;
        selectedNumber.classList.add('correct');
        el.classList.add('correct');
        selectedNumber.classList.remove('selected');
        playSound(true);
        selectedNumber = null;
        if(matchedPairs===10) setTimeout(showPopup,500);
      } else {
        selectedNumber.classList.add('wrong','card-shake');
        el.classList.add('wrong','card-shake');
        playSound(false);
        const sn = selectedNumber;
        setTimeout(()=>{
          sn.classList.remove('wrong','card-shake','selected');
          el.classList.remove('wrong','card-shake');
        },600);
        selectedNumber = null;
      }
    }

    function showPopup() {
      const starCount = attempts<=12?3:attempts<=18?2:1;
      document.getElementById('stars').innerHTML = Array(starCount).fill('<span class="star-anim inline-block">⭐</span>').join('');
      document.getElementById('popup-msg').textContent = `จับคู่ครบ 10 คู่ ใช้ ${attempts} ครั้ง!`;
      document.getElementById('popup').classList.remove('hidden');
    }

    // Element SDK
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.getElementById('game-title').textContent = config.game_title || defaultConfig.game_title;
      },
      mapToCapabilities: (config) => ({
        recolorables: [],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([['game_title', config.game_title || defaultConfig.game_title]])
    });

    startGame();
  </script>

</html>
