
<style>
  .grid-wrap { padding: 1rem 0; }
  .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; flex-wrap: wrap; }
  .score-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 16px; font-size: 14px; color: var(--color-text-secondary); }
  .score-box span { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
  .reset-btn { margin-left: auto; font-size: 13px; padding: 6px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .reset-btn:hover { background: var(--color-background-secondary); }
  .num-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; }
  .num-cell {
    aspect-ratio: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 8px;
    border: 1.5px solid var(--color-border-tertiary);
    cursor: pointer;
    font-size: 13px; font-weight: 500;
    color: var(--color-text-primary);
    background: var(--color-background-primary);
    transition: transform 0.1s, background 0.15s;
    user-select: none;
    line-height: 1.2;
    position: relative;
    overflow: hidden;
  }
  .num-cell .thai { font-size: 9px; color: var(--color-text-tertiary); }
  .num-cell:hover { transform: scale(1.12); border-color: var(--color-border-primary); z-index: 2; }
  .num-cell:active { transform: scale(0.96); }
  .num-cell.clicked {
    color: white;
    border-color: transparent;
  }
  .num-cell.clicked .thai { color: rgba(255,255,255,0.75); }
  .legend { display: flex; gap: 12px; margin-top: 1rem; flex-wrap: wrap; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); }
  .leg-dot { width: 12px; height: 12px; border-radius: 4px; }
  .popup {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
    opacity: 0; pointer-events: none;
    font-size: 48px; font-weight: 500;
    background: var(--color-background-primary);
    border: 2px solid var(--color-border-secondary);
    border-radius: 16px; padding: 16px 32px;
    text-align: center;
    transition: transform 0.15s, opacity 0.15s;
    z-index: 99;
    box-shadow: none;
  }
  .popup.show { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  .popup .thai-big { font-size: 22px; color: var(--color-text-secondary); display: block; }
  .progress-bar { height: 6px; background: var(--color-background-secondary); border-radius: 3px; margin-bottom: 1rem; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: width 0.3s; }
</style>

<div class="grid-wrap">
  <h2 class="sr-only">เกมฝึกนับเลข 1 ถึง 100</h2>

  <div class="top-bar">
    <div class="score-box">กดแล้ว <span id="count">0</span> / 100</div>
    <div class="score-box">สายปัจจุบัน <span id="streak">0</span> 🔥</div>
    <button class="reset-btn" onclick="resetAll()">เริ่มใหม่</button>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div class="num-grid" id="grid"></div>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#5C9EE8"></div> หลักหน่วย</div>
    <div class="leg"><div class="leg-dot" style="background:#E07B54"></div> หลักสิบ</div>
    <div class="leg"><div class="leg-dot" style="background:#6BBF79"></div> สิบเดียวกัน (กดแล้ว)</div>
  </div>
</div>

<div class="popup" id="popup">
  <div id="popup-num"></div>
  <span class="thai-big" id="popup-thai"></span>
</div>

<script>
const thaiNums = ['๐','๑','๒','๓','๔','๕','๖','๗','๘','๙'];
const thaiWords = ['ศูนย์','หนึ่ง','สอง','สาม','สี่','ห้า','หก','เจ็ด','แปด','เก้า','สิบ',
  'สิบเอ็ด','สิบสอง','สิบสาม','สิบสี่','สิบห้า','สิบหก','สิบเจ็ด','สิบแปด','สิบเก้า','ยี่สิบ',
  'ยี่สิบเอ็ด','ยี่สิบสอง','ยี่สิบสาม','ยี่สิบสี่','ยี่สิบห้า','ยี่สิบหก','ยี่สิบเจ็ด','ยี่สิบแปด','ยี่สิบเก้า','สามสิบ',
  'สามสิบเอ็ด','สามสิบสอง','สามสิบสาม','สามสิบสี่','สามสิบห้า','สามสิบหก','สามสิบเจ็ด','สามสิบแปด','สามสิบเก้า','สี่สิบ',
  'สี่สิบเอ็ด','สี่สิบสอง','สี่สิบสาม','สี่สิบสี่','สี่สิบห้า','สี่สิบหก','สี่สิบเจ็ด','สี่สิบแปด','สี่สิบเก้า','ห้าสิบ',
  'ห้าสิบเอ็ด','ห้าสิบสอง','ห้าสิบสาม','ห้าสิบสี่','ห้าสิบห้า','ห้าสิบหก','ห้าสิบเจ็ด','ห้าสิบแปด','ห้าสิบเก้า','หกสิบ',
  'หกสิบเอ็ด','หกสิบสอง','หกสิบสาม','หกสิบสี่','หกสิบห้า','หกสิบหก','หกสิบเจ็ด','หกสิบแปด','หกสิบเก้า','เจ็ดสิบ',
  'เจ็ดสิบเอ็ด','เจ็ดสิบสอง','เจ็ดสิบสาม','เจ็ดสิบสี่','เจ็ดสิบห้า','เจ็ดสิบหก','เจ็ดสิบเจ็ด','เจ็ดสิบแปด','เจ็ดสิบเก้า','แปดสิบ',
  'แปดสิบเอ็ด','แปดสิบสอง','แปดสิบสาม','แปดสิบสี่','แปดสิบห้า','แปดสิบหก','แปดสิบเจ็ด','แปดสิบแปด','แปดสิบเก้า','เก้าสิบ',
  'เก้าสิบเอ็ด','เก้าสิบสอง','เก้าสิบสาม','เก้าสิบสี่','เก้าสิบห้า','เก้าสิบหก','เก้าสิบเจ็ด','เก้าสิบแปด','เก้าสิบเก้า','หนึ่งร้อย'];

function toThaiDigit(n) {
  return String(n).split('').map(d => thaiNums[parseInt(d)]).join('');
}

const colors10 = [
  '#5C9EE8','#E07B54','#D4538A','#8E6BBF','#6BBF79',
  '#E0B254','#54B8C8','#C87A6B','#7AB87A','#9B8EA8'
];

let clicked = new Set();
let streak = 0;
let popupTimer = null;

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let n = 1; n <= 100; n++) {
    const dec = n % 10;
    const tens = Math.floor((n - 1) / 10);
    const baseColor = colors10[dec];
    const cell = document.createElement('div');
    cell.className = 'num-cell';
    cell.id = 'cell-' + n;
    cell.innerHTML = `<span>${n}</span><span class="thai">${toThaiDigit(n)}</span>`;
    cell.style.borderColor = baseColor + '60';
    cell.dataset.n = n;
    cell.dataset.color = baseColor;
    cell.addEventListener('click', () => onCellClick(cell, n, baseColor));
    grid.appendChild(cell);
  }
}

function onCellClick(cell, n, color) {
  if (clicked.has(n)) {
    cell.classList.remove('clicked');
    cell.style.background = '';
    cell.style.borderColor = color + '60';
    clicked.delete(n);
    streak = 0;
  } else {
    cell.classList.add('clicked');
    cell.style.background = color;
    cell.style.borderColor = color;
    clicked.add(n);
    streak++;
    showPopup(n);
  }
  document.getElementById('count').textContent = clicked.size;
  document.getElementById('streak').textContent = streak;
  document.getElementById('prog').style.width = (clicked.size) + '%';

  if (clicked.size === 100) {
    setTimeout(() => alert('🎉 เก่งมาก! นับครบ 100 แล้ว!'), 300);
  }
}

function showPopup(n) {
  const pop = document.getElementById('popup');
  document.getElementById('popup-num').textContent = n + ' = ' + toThaiDigit(n);
  document.getElementById('popup-thai').textContent = thaiWords[n] || '';
  pop.classList.add('show');
  if (popupTimer) clearTimeout(popupTimer);
  popupTimer = setTimeout(() => pop.classList.remove('show'), 1200);
}

function resetAll() {
  clicked.clear();
  streak = 0;
  document.getElementById('count').textContent = 0;
  document.getElementById('streak').textContent = 0;
  document.getElementById('prog').style.width = '0%';
  document.querySelectorAll('.num-cell').forEach(c => {
    c.classList.remove('clicked');
    c.style.background = '';
    const col = c.dataset.color;
    c.style.borderColor = col + '60';
  });
}

buildGrid();
</script>
